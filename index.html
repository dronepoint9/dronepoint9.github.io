<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Hub">
<meta name="theme-color" content="#1a1a1a">
<title>Hub — Nick Seres</title>
<style>
:root { --bg: #f5f5f3; --bg2: #ffffff; --bg3: #efefec; --text: #1a1a1a; --text2: #666; --border: rgba(0,0,0,0.1); --radius: 14px; --radius-sm: 10px; }
@media (prefers-color-scheme: dark) {
  :root { --bg: #141414; --bg2: #1e1e1e; --bg3: #2a2a2a; --text: #f0f0f0; --text2: #888; --border: rgba(255,255,255,0.08); }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 40px; }
.header { padding: 48px 24px 8px; }
.header-title { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.header-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; padding: 24px 24px 10px; }
.app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.app-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  text-decoration: none;
  display: block;
  transition: transform 0.12s, background 0.12s;
}
.app-card:active { transform: scale(0.97); background: var(--bg3); }
.app-icon { font-size: 28px; margin-bottom: 10px; display: block; }
.app-name { font-size: 15px; font-weight: 600; color: var(--text); }
.app-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
.app-card.accent-green { border-left: 3px solid #1D9E75; }
.app-card.accent-blue  { border-left: 3px solid #378ADD; }
.app-card.accent-amber { border-left: 3px solid #EF9F27; }
.app-card.accent-coral { border-left: 3px solid #D85A30; }
.coming-soon { opacity: 0.45; cursor: default; }
.coming-tag { display: inline-block; font-size: 10px; font-weight: 600; background: var(--bg3); color: var(--text2); border-radius: 6px; padding: 1px 6px; margin-top: 6px; }
.footer { text-align: center; font-size: 11px; color: var(--text2); padding: 32px 24px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Hub</div>
  <div class="header-sub">Tulane Construction Group / DronePoint</div>
</div>

<div class="section-label">UAS Operations</div>
<div class="app-grid">
  <a class="app-card accent-green" href="https://dronepoint9.github.io/dronepoint">
    <span class="app-icon">✈</span>
    <div class="app-name">DronePoint</div>
    <div class="app-desc">UAS flight log & checklists</div>
  </a>
  <div class="app-card accent-blue coming-soon">
    <span class="app-icon">🗺</span>
    <div class="app-name">Flight Planner</div>
    <div class="app-desc">Mission area & route planning</div>
    <div class="coming-tag">Coming soon</div>
  </div>
</div>

<div class="section-label">Business</div>
<div class="app-grid">
  <div class="app-card accent-amber coming-soon">
    <span class="app-icon">📄</span>
    <div class="app-name">Proposals</div>
    <div class="app-desc">Project quotes & proposals</div>
    <div class="coming-tag">Coming soon</div>
  </div>
  <div class="app-card accent-coral coming-soon">
    <span class="app-icon">📦</span>
    <div class="app-name">Equipment</div>
    <div class="app-desc">Gear inventory & maintenance</div>
    <div class="coming-tag">Coming soon</div>
  </div>
</div>

<div class="footer">dronepoint9.github.io</div>

</body>
</html>
